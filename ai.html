<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f6;
            --chat-bg: #ffffff;
            --user-msg: #007bff;
            --bot-msg: #e9e9eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #chat-container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background: var(--chat-bg);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-header {
            padding: 20px;
            background: var(--primary-color);
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-msg);
            color: #333;
            border-bottom-left-radius: 2px;
        }

        #input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background: #ccc;
        }

        .typing {
            font-style: italic;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">AI Assistant</div>
    <div id="messages">
        <div class="message bot-message">Hello! How can I help you today?</div>
    </div>
    <div id="typing-indicator" class="typing" style="padding-left: 20px;">AI is thinking...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const API_KEY = "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";
    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    // Function to add a message to the UI
    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        msgDiv.classList.add(isUser ? 'user-message' : 'bot-message');
        msgDiv.textContent = text;
        messagesContainer.appendChild(msgDiv);
        
        // Scroll to bottom
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    async function fetchResponse(prompt) {
        typingIndicator.style.display = 'block';
        sendBtn.disabled = true;

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "mistralai/mistral-7b-instruct:free", // You can change this to "openai/gpt-3.5-turbo"
                    "messages": [
                        {"role": "user", "content": prompt}
                    ]
                })
            });

            const data = await response.json();
            const aiMessage = data.choices[0].message.content;
            addMessage(aiMessage, false);

        } catch (error) {
            console.error("Error:", error);
            addMessage("Sorry, something went wrong. Please try again.", false);
        } finally {
            typingIndicator.style.display = 'none';
            sendBtn.disabled = false;
        }
    }

    function handleSend() {
        const text = userInput.value.trim();
        if (text) {
            addMessage(text, true);
            userInput.value = '';
            fetchResponse(text);
        }
    }

    sendBtn.addEventListener('click', handleSend);

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            handleSend();
        }
    });
</script>

</body>
</html>
